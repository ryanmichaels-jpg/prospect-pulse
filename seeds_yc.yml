# YC W25 batch — companies with public GitHub orgs
#
# Source: YC_W25_test.xlsx, scraped from YC's batch directory
# Used by prospect-pulse to demonstrate the rubric against a fresh,
# heterogeneous, audience-relevant cohort. All companies are YC seed-stage
# (2-10 engineers typical), so employee_estimate defaults to 5 and
# funding_stage to 'seed'. ai_native defaults to true (every entry is
# AI-themed). Industry is inferred from the one-liner — see classify() in
# the build script if you need to re-classify.
#
# Run with: python3 -u run.py --seeds seeds_yc.yml

